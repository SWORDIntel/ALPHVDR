<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALPHVDR | Threat Intel Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Outfit:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #000000;
            --glass-bg: rgba(10, 0, 0, 0.65);
            --glass-border: rgba(255, 0, 0, 0.15);
            --accent-red: #ff0033;
            --accent-red-glow: rgba(255, 0, 51, 0.6);
            --accent-dark-red: #8b0000;
            --text-main: #e2e8f0;
            --text-muted: #94a3b8;
        }
        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }
        /* Background grid effect */
        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
                linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
            background-size: 30px 30px;
            z-index: -1;
        }
        header {
            padding: 2rem 4rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--glass-border);
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(12px);
        }
        h1 {
            font-family: 'Outfit', sans-serif;
            margin: 0;
            font-size: 2rem;
            color: var(--accent-red);
            text-shadow: 0 0 10px var(--accent-red-glow);
            letter-spacing: 2px;
        }
        .status-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            background: rgba(255, 0, 51, 0.1);
            border: 1px solid rgba(255, 0, 51, 0.3);
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--accent-red);
            animation: pulse 2s infinite;
        }
        .status-dot {
            width: 8px; height: 8px;
            background: var(--accent-red);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--accent-red);
        }
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(255, 0, 51, 0.5); }
            70% { box-shadow: 0 0 0 10px rgba(255, 0, 51, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 0, 51, 0); }
        }
        .container {
            flex: 1;
            padding: 3rem 4rem;
            display: grid;
            grid-template-columns: 1fr;
            gap: 2rem;
        }
        .panel {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 2rem;
            backdrop-filter: blur(16px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            transition: transform 0.3s ease, border-color 0.3s ease;
        }
        .panel:hover {
            transform: translateY(-2px);
            border-color: rgba(255, 51, 102, 0.4);
        }
        .panel-header {
            font-family: 'Outfit', sans-serif;
            font-size: 1.5rem;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 12px;
            color: var(--text-main);
        }
        
        /* Buttons */
        .ctrl-btn {
            background: rgba(255, 0, 51, 0.1);
            border: 1px solid rgba(255, 0, 51, 0.4);
            color: var(--text-main);
            padding: 10px 20px;
            border-radius: 8px;
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 1px;
        }
        .ctrl-btn:hover {
            background: var(--accent-red);
            box-shadow: 0 0 15px var(--accent-red-glow);
            border-color: var(--accent-red);
            transform: translateY(-1px);
        }
        .ctrl-btn:active {
            transform: translateY(1px);
        }

        .event-list {
            list-style: none;
            padding: 0;
            margin: 0;
            max-height: 60vh;
            overflow-y: auto;
        }
        .event-list::-webkit-scrollbar { width: 8px; }
        .event-list::-webkit-scrollbar-track { background: transparent; }
        .event-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }
        
        .event-item {
            padding: 1rem;
            margin-bottom: 1rem;
            background: rgba(20, 0, 0, 0.4);
            border-left: 4px solid var(--accent-dark-red);
            border-radius: 4px 8px 8px 4px;
            font-family: monospace;
            font-size: 0.95rem;
            word-break: break-all;
            animation: slideIn 0.3s ease-out;
            transition: background 0.2s, border-color 0.2s;
        }
        .event-item:hover {
            background: rgba(40, 0, 0, 0.6);
        }
        .event-item.threat {
            border-left-color: var(--accent-red);
            background: linear-gradient(90deg, rgba(255, 0, 51, 0.15), transparent);
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-10px); }
            to { opacity: 1; transform: translateX(0); }
        }
    </style>
</head>
<body>
    <header>
        <h1>ALPHVDR CORE</h1>
        <div class="status-badge">
            <div class="status-dot"></div>
            QIHSE TELEMETRY ACTIVE
        </div>
    </header>
    
    <div class="container">
        <!-- Command & Control Panel -->
        <div class="panel" style="margin-bottom: -1rem;">
            <div class="panel-header">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--accent-red)" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
                Active Response Controls
            </div>
            <div style="display: flex; gap: 1rem; flex-wrap: wrap;">
                <button onclick="sendCommand('FLUSH_XDP_BLOCKLIST')" class="ctrl-btn">Flush XDP Blocklist</button>
                <button onclick="sendCommand('RELOAD_YARA_RULES')" class="ctrl-btn">Reload YARA Rules</button>
                <button onclick="sendCommand('TOGGLE_KP14_MODE')" class="ctrl-btn">Toggle KP14 Sandbox</button>
                <button onclick="sendCommand('ISOLATE_NETWORK')" class="ctrl-btn" style="background: rgba(139,0,0,0.4); border-color: #ff0000;">Emergency Network Isolate</button>
            </div>
        </div>

        <div class="panel">
            <div class="panel-header">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--accent-red)" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
                Live Threat Intelligence & Telemetry (QIHSE WAL)
            </div>
            <ul class="event-list" id="events-container">
                <!-- Events populated by JS -->
            </ul>
        </div>
    </div>

    <script>
        async function fetchEvents() {
            try {
                const response = await fetch('/api/events');
                const events = await response.json();
                const container = document.getElementById('events-container');
                container.innerHTML = ''; // Clear old events
                
                if (events.length === 0) {
                    container.innerHTML = '<li class="event-item">No telemetry events logged yet. System is secure.</li>';
                    return;
                }

                events.forEach(eventStr => {
                    const li = document.createElement('li');
                    li.className = 'event-item';
                    
                    // Highlight threats
                    if (eventStr.includes('TRAP') || eventStr.includes('YARA') || eventStr.includes('EDR_ACTION') || eventStr.includes('THREAT_INTEL')) {
                        li.classList.add('threat');
                    }
                    
                    li.textContent = eventStr;
                    container.appendChild(li);
                });
            } catch (error) {
                console.error("Failed to fetch events:", error);
            }
        }

        async function sendCommand(action) {
            try {
                const res = await fetch('/api/control', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action })
                });
                if (res.ok) {
                    console.log(`Action ${action} executed successfully.`);
                    // Force an immediate UI refresh to show the manual action
                    fetchEvents();
                } else {
                    alert(`Failed to execute ${action}`);
                }
            } catch (err) {
                console.error(err);
                alert(`Error executing ${action}`);
            }
        }

        // Fetch immediately and poll every 2 seconds
        fetchEvents();
        setInterval(fetchEvents, 2000);
    </script>
</body>
</html>
