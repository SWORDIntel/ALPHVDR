version: '3.8'

services:
  misp:
    image: coolacid/misp-docker:core-latest
    depends_on:
      - redis
      - db
    ports:
      - "8080:80"
      - "8443:443"
    environment:
      - MYSQL_HOST=db
      - MYSQL_DATABASE=misp
      - MYSQL_USER=misp
      - MYSQL_PASSWORD=misp_password
      - MISP_ADMIN_EMAIL=admin@admin.test
      - MISP_ADMIN_PASSPHRASE=admin
      - MISP_BASEURL=https://localhost:8443
    restart: unless-stopped

  redis:
    image: redis:6-alpine
    restart: unless-stopped

  db:
    image: mariadb:10.4
    environment:
      - MYSQL_DATABASE=misp
      - MYSQL_USER=misp
      - MYSQL_PASSWORD=misp_password
      - MYSQL_ROOT_PASSWORD=misp_root_password
    restart: unless-stopped
    volumes:
      - misp-db:/var/lib/mysql

volumes:
  misp-db:
